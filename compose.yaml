version: '3.8'

services:
  invest-smart:
    build:
      context: .
      dockerfile: Dockerfile
    image: blk-hacking-ind-shreyans
    container_name: invest-smart
    ports:
      - "5477:5477"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xms256m -Xmx512m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5477/blackrock/challenge/v1/performance"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
