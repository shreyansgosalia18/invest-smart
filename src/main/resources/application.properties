# =============================================================================
# InvestSmart ? Application Configuration
# =============================================================================

# --------------------------------
# Server
# --------------------------------
server.port=5477
spring.application.name=invest-smart

# Enable Virtual Threads (Java 21 + Spring Boot 3.2+)
# Each HTTP request gets a lightweight virtual thread instead of a platform thread
# Enables handling 10,000+ concurrent requests without thread pool exhaustion
spring.threads.virtual.enabled=true

# --------------------------------
# Actuator ? Health, Metrics, Info
# --------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=InvestSmart
info.app.description=Automated retirement micro-savings engine
info.app.version=1.0.0

# --------------------------------
# Security
# --------------------------------
# Disable default Spring Security password generation (we use permitAll config)
spring.security.user.name=disabled
spring.security.user.password=disabled

# --------------------------------
# Logging
# --------------------------------
logging.level.root=INFO
logging.level.com.blackrock.investsmart=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# --------------------------------
# OpenAPI / Swagger
# --------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# --------------------------------
# Jackson (JSON serialization)
# --------------------------------
# Don't include null fields in responses
spring.jackson.default-property-inclusion=non_null
# Ensure doubles serialize cleanly (no trailing zeros where unnecessary)
spring.jackson.serialization.write-dates-as-timestamps=false